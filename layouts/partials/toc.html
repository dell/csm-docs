{{ if not .Params.notoc -}}
  {{ with .TableOfContents -}}
    {{ if ne . `<nav id="TableOfContents"></nav>` -}}
      <div class="td-toc">
        {{ . }}
      </div>
    {{ else -}}
      <style>
        .td-sidebar-toc {
          display: none !important;
        }
      </style>
    {{ end -}}
  {{ end -}}
{{ end -}}
