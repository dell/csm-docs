{{- $hide := .Get "hide" | default "false" -}}
{{- $inline := .Get "inline" | default "false" -}}
{{- $id := .Get "id" -}}
{{- if eq $hide "true" -}}
<style>
.hidden-content {
  display: none;
}
</style>
<span id="{{ $id }}" class="hidden-content">
  {{ .Inner | markdownify }}
</span>
{{- else -}}
<style>
.visible-content {
  display: block;
}
.inline-content {
  display: inline;
}
</style>
<span id="{{ $id }}" class="{{ if eq $inline "true" }}inline-content{{ else }}visible-content{{ end }}">
  {{ .Inner | markdownify }}
</span>
{{- end -}}
